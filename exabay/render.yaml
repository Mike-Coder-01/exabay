databases:
  - name: exabaydb
    plan: free
    databaseName: exabay
    user: exabay

services:
  - type: web
    plan: free
    name: exabay
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn exabay.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exabaydb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4