{% extends "main/base.html" %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Email addresses</h1>

    {% if emailaddresses %}
      <form method="post" action="{% url 'account_email' %}">
        {% csrf_token %}

        {% for emailaddress in emailaddresses %}
          <label class="email-option">
            <input
              type="radio"
              name="email"
              value="{{ emailaddress.email }}"
              {% if emailaddress.primary %}checked{% endif %}
            >

            <span>
              {{ emailaddress.email }}

              {% if emailaddress.verified %}
                <strong>Verified</strong>
              {% else %}
                <strong>Unverified</strong>
              {% endif %}

              {% if emailaddress.primary %}
                <strong>Primary</strong>
              {% endif %}
            </span>
          </label>
        {% endfor %}

        <div class="button-group">
          <button type="submit" name="action_primary" class="btn btn-secondary">
            Make primary
          </button>
          <button type="submit" name="action_send" class="btn btn-secondary">
            Resend verification
          </button>
          <button type="submit" name="action_remove" class="btn btn-danger">
            Remove
          </button>
        </div>
      </form>
    {% endif %}

    <h2>Add email</h2>

    <form method="post" action="{% url 'account_email' %}">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" name="action_add" class="btn btn-primary">
        Add email
      </button>
    </form>
  </div>
</section>
{% endblock %}
