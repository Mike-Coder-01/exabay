{% extends "base.html" %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Change password</h1>

    <form method="post" action="{% url 'account_change_password' %}">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary">Update password</button>
    </form>
  </div>
</section>
{% endblock %}
