{% extends "main/base.html" %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h1>Set password</h1>
    <p>Add a password to your Exabay account.</p>

    <form method="post" action="{% url 'account_set_password' %}">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary">Set password</button>
    </form>
  </div>
</section>
{% endblock %}
